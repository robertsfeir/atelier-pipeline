<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* =========================================================================
       Atelier Dashboard -- Design System
       ========================================================================= */

    :root {
      --bg: #f6f9fd;
      --surface: #ffffff;
      --accent: #e83e52;
      --deep: #021227;
      --text: #1a2234;
      --text-mid: #475569;
      --text-light: #94a3b8;
      --gradient: linear-gradient(135deg, #f08a6e 0%, #e83e52 40%, #8b3fa0 100%);
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(2, 18, 39, 0.06), 0 1px 2px rgba(2, 18, 39, 0.04);
      --shadow-md: 0 4px 12px rgba(2, 18, 39, 0.08), 0 2px 4px rgba(2, 18, 39, 0.04);
      --shadow-hover: 0 8px 24px rgba(2, 18, 39, 0.12), 0 4px 8px rgba(2, 18, 39, 0.06);
      --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --green: #059669;
      --green-bg: #ecfdf5;
      --amber: #d97706;
      --amber-bg: #fffbeb;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --purple: #8b3fa0;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* =========================================================================
       Layout
       ========================================================================= */

    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* =========================================================================
       Header
       ========================================================================= */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      font-weight: 400;
      margin: 0;
      color: var(--deep);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-mid);
    }

    .scope-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scope-selector.hidden {
      display: none;
    }

    .scope-label {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-mid);
    }

    .scope-select {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      color: var(--deep);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 5px 28px 5px 12px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23475569' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .scope-select:hover {
      border-color: var(--text-light);
    }

    .scope-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(232, 62, 82, 0.12);
    }

    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* =========================================================================
       Section Structure
       ========================================================================= */

    .section {
      margin-bottom: 28px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-icon {
      width: 20px;
      height: 20px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .section-title {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-mid);
      margin: 0;
    }

    .accent-line {
      height: 3px;
      background: var(--gradient);
      border-radius: 2px;
      margin-bottom: 20px;
    }

    /* =========================================================================
       Cards & Surfaces
       ========================================================================= */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    /* =========================================================================
       Stat Blocks (Pipeline Overview)
       ========================================================================= */

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .stat-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }

    .stat-block:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-mid);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-sub {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* =========================================================================
       Chart Containers
       ========================================================================= */

    .chart-container {
      position: relative;
      height: 280px;
      width: 100%;
    }

    /* =========================================================================
       Agent Fitness Cards
       ========================================================================= */

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.15s ease;
      cursor: pointer;
    }

    .agent-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .agent-card--orchestrator {
      cursor: default;
    }

    .agent-card--orchestrator:hover {
      box-shadow: var(--shadow);
      transform: none;
    }

    .agent-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .agent-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--deep);
      text-transform: capitalize;
    }

    .agent-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-thriving { background: var(--green-bg); color: var(--green); }
    .badge-nominal { background: var(--border-light); color: var(--text-mid); }
    .badge-struggling { background: var(--amber-bg); color: var(--amber); }
    .badge-failing { background: var(--red-bg); color: var(--red); }
    .badge-processing { background: transparent; color: var(--text-light); border: 1px solid var(--border); }

    .agent-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .agent-stat-label {
      font-size: 0.72rem;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .agent-stat-value {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--text);
    }

    /* =========================================================================
       Alert Cards
       ========================================================================= */

    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alert-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--amber-bg);
      border: 1px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 16px;
    }

    .alert-card.alert-critical {
      background: var(--red-bg);
      border-color: #fca5a5;
    }

    .alert-icon {
      width: 20px;
      height: 20px;
      color: var(--amber);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .alert-card.alert-critical .alert-icon {
      color: var(--red);
    }

    .alert-text {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.5;
    }

    .alert-metric {
      font-weight: 600;
    }

    /* =========================================================================
       Pipeline Table
       ========================================================================= */

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pipeline-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .pipeline-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-mid);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .pipeline-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
      white-space: nowrap;
    }

    .pipeline-table tr:last-child td {
      border-bottom: none;
    }

    .pipeline-table tr:hover td {
      background: var(--border-light);
    }

    .pipeline-table .num {
      font-family: var(--font-serif);
      color: var(--text);
    }

    .sizing-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      background: var(--border-light);
      color: var(--text-mid);
    }

    .sizing-large { background: #ede9fe; color: #6d28d9; }
    .sizing-medium { background: #e0f2fe; color: #0369a1; }
    .sizing-small { background: #ecfdf5; color: #059669; }
    .sizing-micro { background: var(--border-light); color: var(--text-light); }

    /* =========================================================================
       Empty State
       ========================================================================= */

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-mid);
    }

    .empty-state-icon {
      width: 48px;
      height: 48px;
      color: var(--text-light);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text);
      margin: 0 0 8px;
    }

    .empty-state p {
      font-size: 0.875rem;
      margin: 0;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* =========================================================================
       Error State
       ========================================================================= */

    .error-banner {
      background: var(--red-bg);
      border: 1px solid #fca5a5;
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      text-align: center;
      color: var(--red);
      font-size: 0.875rem;
      margin-bottom: 24px;
      display: none;
    }

    .error-banner.visible {
      display: block;
    }

    /* =========================================================================
       Loading Skeleton
       ========================================================================= */

    .skeleton {
      background: linear-gradient(90deg, var(--border-light) 25%, var(--border) 50%, var(--border-light) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* =========================================================================
       Agent Detail Modal
       ========================================================================= */

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 18, 39, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 200ms ease;
      pointer-events: none;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-hover);
      padding: 28px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .modal-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-agent-name {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      color: var(--deep);
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 1.5rem;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--border-light);
    }

    .modal-accent-line {
      height: 3px;
      background: var(--gradient);
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section:last-child {
      margin-bottom: 0;
    }

    .modal-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-mid);
    }

    .modal-section-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .modal-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .modal-table th {
      text-align: left;
      padding: 8px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-mid);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .modal-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }

    .modal-table tr:last-child td {
      border-bottom: none;
    }

    .modal-table .num {
      font-family: var(--font-serif);
      white-space: nowrap;
    }

    .modal-table .desc {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-loading {
      text-align: center;
      padding: 32px;
      color: var(--text-mid);
      font-size: 0.875rem;
    }

    /* =========================================================================
       Responsive
       ========================================================================= */

    @media (max-width: 768px) {
      .dashboard {
        padding: 20px 16px 64px;
      }

      .header h1 {
        font-size: 1.4rem;
      }

      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }

      .agent-grid {
        grid-template-columns: 1fr;
      }

      .chart-container {
        height: 220px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .stat-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Error Banner -->
    <div class="error-banner" id="error-banner">
      Unable to connect to brain server. Ensure the server is running at <code>localhost:8788</code>.
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="url(#grad)" stroke-width="2.5" fill="none"/>
          <path d="M20 10c-5.5 0-10 4.5-10 10s4.5 10 10 10 10-4.5 10-10-4.5-10-10-10zm0 3a7 7 0 014.9 2.1l-3.2 3.2A3 3 0 0020 17v-4zm-5.6 3.4L17.6 19.6A3 3 0 0017 20h-4a7 7 0 011.4-3.6zM20 23a3 3 0 01-2.1-.9l-3.2 3.2A7 7 0 0013 20h4a3 3 0 003 3zm1-3a1 1 0 11-2 0 1 1 0 012 0zm2.6 5.6l-3.2-3.2c.5-.5.8-1.1.9-1.8l4.5.5A7 7 0 0123.6 25.6z" fill="url(#grad)" opacity="0.9"/>
          <circle cx="20" cy="20" r="2" fill="url(#grad)"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#f08a6e"/>
              <stop offset="40%" stop-color="#e83e52"/>
              <stop offset="100%" stop-color="#8b3fa0"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>Atelier Dashboard</h1>
      </div>
      <div class="header-meta">
        <div class="scope-selector hidden" id="scope-selector">
          <span class="scope-label">Project:</span>
          <select class="scope-select" id="scope-select">
            <option value="all">All Projects</option>
          </select>
        </div>
        <span id="last-refreshed">Loading...</span>
        <div class="refresh-indicator">
          <span class="refresh-dot" id="refresh-dot"></span>
          <span>Auto-refresh</span>
        </div>
      </div>
    </header>

    <!-- Pipeline Overview -->
    <section class="section" id="section-overview">
      <div class="accent-line"></div>
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="16" height="16" rx="3"/>
          <path d="M6 12V14M10 8V14M14 10V14"/>
        </svg>
        <h2 class="section-title">Pipeline Overview</h2>
      </div>
      <div class="stat-grid" id="stat-grid">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- Cost Trend -->
    <section class="section" id="section-cost">
      <div class="accent-line"></div>
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="8"/>
          <path d="M10 6v8M8 8h4c.6 0 1.1.4 1.1 1s-.5 1-1.1 1H8h4c.6 0 1.1.4 1.1 1s-.5 1-1.1 1H8"/>
        </svg>
        <h2 class="section-title">Cost Trend</h2>
      </div>
      <div class="card">
        <div class="chart-container">
          <canvas id="cost-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- Quality Trend -->
    <section class="section" id="section-quality">
      <div class="accent-line"></div>
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 2l2.4 4.8L18 7.6l-4 3.9.9 5.5L10 14.5 5.1 17l.9-5.5-4-3.9 5.6-.8z"/>
        </svg>
        <h2 class="section-title">Quality Trend</h2>
      </div>
      <div class="card">
        <div class="chart-container">
          <canvas id="quality-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- Agent Fitness -->
    <section class="section" id="section-agents">
      <div class="accent-line"></div>
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="3"/>
          <circle cx="14" cy="8" r="2.5"/>
          <path d="M1 18c0-3.3 2.7-6 6-6s6 2.7 6 6M11 18c0-2.5 1.8-4.5 4-4.5s4 2 4 4.5"/>
        </svg>
        <h2 class="section-title">Agent Fitness</h2>
      </div>
      <div class="agent-grid" id="agent-grid">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- Degradation Alerts -->
    <section class="section" id="section-alerts">
      <div class="accent-line"></div>
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8.6 3.5L1.4 15.5c-.5.9.1 2 1.2 2h14.8c1.1 0 1.7-1.1 1.2-2L11.4 3.5c-.5-.9-2.3-.9-2.8 0z"/>
          <path d="M10 8v3M10 14h.01"/>
        </svg>
        <h2 class="section-title">Degradation Alerts</h2>
      </div>
      <div class="alert-list" id="alert-list">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- Agent Detail Modal -->
    <div class="modal-overlay" id="agent-modal-overlay">
      <div class="modal" id="agent-modal">
        <div class="modal-header">
          <div class="modal-header-left">
            <span class="modal-agent-name" id="modal-agent-name"></span>
            <span class="agent-badge" id="modal-agent-badge"></span>
          </div>
          <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="modal-accent-line"></div>
        <div id="modal-body">
          <div class="modal-loading">Loading agent detail...</div>
        </div>
      </div>
    </div>

    <!-- Recent Pipelines -->
    <section class="section" id="section-pipelines">
      <div class="accent-line"></div>
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="16" height="14" rx="2"/>
          <path d="M2 7h16M6 3v4M14 3v4"/>
        </svg>
        <h2 class="section-title">Recent Pipelines</h2>
      </div>
      <div class="card">
        <div class="table-wrap" id="pipelines-table-wrap">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      "use strict";

      // =======================================================================
      // Config
      // =======================================================================

      const API_TOKEN = window.__ATELIER_API_TOKEN__ || null;
      const REFRESH_INTERVAL = 600000; // 10 minutes

      // =======================================================================
      // Utility
      // =======================================================================

      function api(path) {
        const headers = {};
        if (API_TOKEN) headers["Authorization"] = "Bearer " + API_TOKEN;
        return fetch(path, { headers }).then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        });
      }

      function fmt(n, decimals) {
        if (n === null || n === undefined) return "--";
        return Number(n).toFixed(decimals !== undefined ? decimals : 2);
      }

      function fmtCost(n) {
        if (n === null || n === undefined) return "--";
        return "$" + Number(n).toFixed(2);
      }

      function fmtDuration(ms) {
        if (ms === null || ms === undefined) return "--";
        var sec = Math.round(ms / 1000);
        if (sec < 60) return sec + "s";
        var min = Math.floor(sec / 60);
        var remainSec = sec % 60;
        if (min < 60) return min + "m " + remainSec + "s";
        var hr = Math.floor(min / 60);
        var remainMin = min % 60;
        return hr + "h " + remainMin + "m";
      }

      function fmtDate(ts) {
        if (!ts) return "--";
        var d = new Date(ts);
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
      }

      function fmtPercent(n) {
        if (n === null || n === undefined) return "--";
        return Math.round(n * 100) + "%";
      }

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // =======================================================================
      // State
      // =======================================================================

      var summaryData = [];
      var agentData = [];
      var costChart = null;
      var qualityChart = null;
      var refreshTimer = null;
      var selectedScope = "all";

      // =======================================================================
      // Scope Selector
      // =======================================================================

      function loadScopes() {
        api("/api/telemetry/scopes").then(function (scopes) {
          var container = document.getElementById("scope-selector");
          var select = document.getElementById("scope-select");
          if (!scopes || scopes.length === 0) {
            container.classList.add("hidden");
            return;
          }
          container.classList.remove("hidden");
          // Preserve current selection if still valid
          var prevValue = select.value;
          select.innerHTML = '<option value="all">All Projects</option>';
          scopes.forEach(function (s) {
            var opt = document.createElement("option");
            opt.value = s;
            opt.textContent = s;
            select.appendChild(opt);
          });
          // Restore previous selection if it still exists
          if (prevValue && Array.prototype.slice.call(select.options).some(function (o) { return o.value === prevValue; })) {
            select.value = prevValue;
          }
          selectedScope = select.value;
        }).catch(function () {
          // Silently hide the selector if scopes endpoint fails
          document.getElementById("scope-selector").classList.add("hidden");
        });
      }

      function onScopeChange() {
        var select = document.getElementById("scope-select");
        selectedScope = select.value;
        loadData();
      }

      // =======================================================================
      // Data Loading
      // =======================================================================

      function buildScopeParam() {
        if (selectedScope && selectedScope !== "all") {
          return "?scope=" + encodeURIComponent(selectedScope);
        }
        return "";
      }

      function loadData() {
        var errorBanner = document.getElementById("error-banner");
        var scopeParam = buildScopeParam();
        Promise.all([
          api("/api/telemetry/summary" + scopeParam),
          api("/api/telemetry/agents" + scopeParam)
        ]).then(function (results) {
          summaryData = results[0] || [];
          agentData = results[1] || [];
          errorBanner.classList.remove("visible");
          render();
          updateRefreshTime();
        }).catch(function () {
          errorBanner.classList.add("visible");
          updateRefreshTime();
        });
      }

      function loadAll() {
        loadScopes();
        loadData();
      }

      function updateRefreshTime() {
        var el = document.getElementById("last-refreshed");
        el.textContent = "Updated " + new Date().toLocaleTimeString();
      }

      // =======================================================================
      // Rendering
      // =======================================================================

      function render() {
        renderOverview();
        renderCostChart();
        renderQualityChart();
        renderAgents();
        renderAlerts();
        renderPipelinesTable();
      }

      // -- Pipeline Overview --------------------------------------------------

      function renderOverview() {
        var grid = document.getElementById("stat-grid");
        if (summaryData.length === 0) {
          grid.innerHTML = emptyCard("No pipeline data yet", "Run a pipeline to see telemetry here.");
          return;
        }

        // Aggregate totals across all Tier 3 summary entries
        var totalCost = 0;
        var totalDuration = 0;
        var totalInvocations = 0;
        var pipelineCount = 0;
        var minDuration = null;
        var maxDuration = null;

        var reworkSum = 0, reworkCount = 0;
        var evoSum = 0, evoCount = 0;
        var qaSum = 0, qaCount = 0;

        summaryData.forEach(function (r) {
          var m = r.metadata || {};
          pipelineCount++;
          if (m.total_cost_usd !== null && m.total_cost_usd !== undefined) {
            totalCost += Number(m.total_cost_usd) || 0;
          }
          if (m.total_duration_ms !== null && m.total_duration_ms !== undefined) {
            var d = Number(m.total_duration_ms) || 0;
            totalDuration += d;
            if (d > 0) {
              if (minDuration === null || d < minDuration) minDuration = d;
              if (maxDuration === null || d > maxDuration) maxDuration = d;
            }
          }
          if (m.total_invocations !== null && m.total_invocations !== undefined) {
            totalInvocations += Number(m.total_invocations) || 0;
          }
          if (m.rework_rate !== null && m.rework_rate !== undefined) {
            reworkSum += Number(m.rework_rate);
            reworkCount++;
          }
          if (m.evoscore !== null && m.evoscore !== undefined) {
            evoSum += Number(m.evoscore);
            evoCount++;
          }
          if (m.first_pass_qa_rate !== null && m.first_pass_qa_rate !== undefined) {
            qaSum += Number(m.first_pass_qa_rate);
            qaCount++;
          }
        });

        // Check if we have any meaningful data at all
        var hasData = totalCost > 0 || totalDuration > 0 ||
                      reworkCount > 0 || evoCount > 0 || qaCount > 0;

        if (!hasData) {
          grid.innerHTML = '<div class="stat-block" style="grid-column: 1 / -1; text-align: center;">' +
            '<div class="stat-label">Pipeline Overview</div>' +
            '<div class="stat-value" style="font-size: 1.1rem; color: var(--text-mid);">Awaiting pipeline data</div>' +
            '<div class="stat-sub">Metrics will populate after your first pipeline run with full telemetry.</div>' +
          '</div>';
          return;
        }

        var avgRework = reworkCount > 0 ? reworkSum / reworkCount : null;
        var avgEvo    = evoCount > 0    ? evoSum    / evoCount    : null;
        var avgQa     = qaCount > 0     ? qaSum     / qaCount     : null;

        var avgCostPerPipeline = pipelineCount > 0 ? totalCost / pipelineCount : null;

        var durationSub2 = null;
        if (pipelineCount > 1 && minDuration !== null && maxDuration !== null) {
          durationSub2 = "min: " + fmtDuration(minDuration) + " \u00b7 max: " + fmtDuration(maxDuration);
        }

        var stats = [
          {
            label: "Total Cost",
            value: totalCost > 0 ? fmtCost(totalCost) : "--",
            sub: "all time",
            sub2: avgCostPerPipeline !== null ? "avg " + fmtCost(avgCostPerPipeline) + "/pipeline" : null
          },
          {
            label: "Duration",
            value: totalDuration > 0 ? fmtDuration(totalDuration) : "--",
            sub: "all time",
            sub2: durationSub2
          },
          {
            label: "Rework Rate",
            value: avgRework !== null ? fmt(avgRework, 1) : "--",
            sub: reworkCount > 0 ? "avg across " + reworkCount + " pipeline" + (reworkCount !== 1 ? "s" : "") : "awaiting pipeline data"
          },
          {
            label: "EvoScore",
            value: avgEvo !== null ? fmt(avgEvo, 2) : "--",
            sub: evoCount > 0 ? "avg across " + evoCount + " pipeline" + (evoCount !== 1 ? "s" : "") : "awaiting pipeline data"
          },
          {
            label: "First-Pass QA",
            value: avgQa !== null ? fmtPercent(avgQa) : "--",
            sub: qaCount > 0 ? "avg across " + qaCount + " pipeline" + (qaCount !== 1 ? "s" : "") : "awaiting pipeline data"
          },
        ];

        grid.innerHTML = stats.map(function (s) {
          return '<div class="stat-block">' +
            '<div class="stat-label">' + escapeHtml(s.label) + '</div>' +
            '<div class="stat-value">' + escapeHtml(s.value) + '</div>' +
            (s.sub ? '<div class="stat-sub">' + escapeHtml(s.sub) + '</div>' : '') +
            (s.sub2 ? '<div class="stat-sub" style="color: var(--text-light); font-size: 0.75rem; margin-top: 2px;">' + s.sub2 + '</div>' : '') +
            '</div>';
        }).join("");
      }

      // -- Cost Chart ---------------------------------------------------------

      function showChartEmpty(canvas, html) {
        canvas.style.display = "none";
        var existing = canvas.parentElement.querySelector(".chart-empty-state");
        if (existing) existing.remove();
        var div = document.createElement("div");
        div.className = "chart-empty-state";
        div.innerHTML = html;
        canvas.parentElement.appendChild(div);
      }

      function clearChartEmpty(canvas) {
        var existing = canvas.parentElement.querySelector(".chart-empty-state");
        if (existing) existing.remove();
        canvas.style.display = "";
      }

      function renderCostChart() {
        var canvas = document.getElementById("cost-chart");

        if (summaryData.length === 0) {
          if (costChart) { costChart.destroy(); costChart = null; }
          showChartEmpty(canvas, emptyCard("No cost data", "Cost trends appear after your first pipeline."));
          return;
        }

        clearChartEmpty(canvas);
        var ctx = canvas.getContext("2d");

        // Aggregate sessions by calendar day (YYYY-MM-DD from created_at)
        var dayMap = {};
        summaryData.forEach(function (r) {
          var dayKey = r.created_at ? r.created_at.slice(0, 10) : "unknown";
          if (!dayMap[dayKey]) {
            dayMap[dayKey] = { key: dayKey, cost: 0, count: 0 };
          }
          var m = r.metadata || {};
          var cost = m.total_cost_usd !== null && m.total_cost_usd !== undefined ? Number(m.total_cost_usd) : 0;
          dayMap[dayKey].cost += cost;
          dayMap[dayKey].count += 1;
        });

        // Sort ascending (oldest left, newest right)
        var aggregated = Object.values(dayMap).sort(function (a, b) {
          return a.key < b.key ? -1 : a.key > b.key ? 1 : 0;
        });

        var labels = aggregated.map(function (day) {
          if (day.key === "unknown") return "—";
          var d = new Date(day.key + "T00:00:00");
          return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        });
        var costs = aggregated.map(function (day) { return day.cost; });

        var config = {
          type: "line",
          data: {
            labels: labels,
            datasets: [{
              label: "Total Cost ($)",
              data: costs,
              borderColor: "#e83e52",
              backgroundColor: "rgba(232, 62, 82, 0.08)",
              fill: true,
              tension: 0.3,
              pointRadius: 4,
              pointBackgroundColor: "#e83e52",
              pointHoverRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: "top", labels: { font: { family: "'DM Sans'" }, usePointStyle: true, pointStyle: "circle" } },
              tooltip: {
                callbacks: {
                  title: function (items) {
                    return labels[items[0].dataIndex] || "—";
                  },
                  label: function (item) {
                    var day = aggregated[item.dataIndex];
                    var runs = day ? day.count : 1;
                    return "$" + item.raw.toFixed(2) + " (" + runs + " pipeline" + (runs === 1 ? "" : "s") + ")";
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: function (v) { return "$" + v.toFixed(2); }, font: { family: "'DM Sans'" } },
                grid: { color: "rgba(0,0,0,0.04)" },
              },
              x: {
                ticks: { font: { family: "'DM Sans'" } },
                grid: { display: false },
              }
            }
          }
        };

        if (costChart) {
          costChart.data = config.data;
          costChart.update();
        } else {
          costChart = new Chart(ctx, config);
        }
      }

      // -- Quality Chart ------------------------------------------------------

      function renderQualityChart() {
        var canvas = document.getElementById("quality-chart");

        if (summaryData.length === 0) {
          if (qualityChart) { qualityChart.destroy(); qualityChart = null; }
          showChartEmpty(canvas, emptyCard("No quality data", "Quality trends appear after your first pipeline."));
          return;
        }

        var sorted = summaryData.slice().reverse();

        // Check if all quality values are null -- if so, show informative empty state
        var hasAnyQualityData = sorted.some(function (r) {
          var m = r.metadata || {};
          return (m.first_pass_qa_rate !== null && m.first_pass_qa_rate !== undefined) ||
                 (m.rework_rate !== null && m.rework_rate !== undefined);
        });

        if (!hasAnyQualityData) {
          if (qualityChart) { qualityChart.destroy(); qualityChart = null; }
          showChartEmpty(canvas, '<div class="empty-state" style="padding:32px">' +
            '<svg class="empty-state-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<rect x="6" y="6" width="36" height="36" rx="6"/>' +
            '<path d="M18 20h12M18 28h8"/>' +
            '</svg>' +
            '<h3>Quality metrics not yet available</h3>' +
            '<p>Quality metrics (first-pass QA rate, rework rate) require pipeline telemetry capture. ' +
            'These will populate automatically after your first pipeline run with v3.8.0+.</p>' +
          '</div>');
          return;
        }

        clearChartEmpty(canvas);
        var ctx = canvas.getContext("2d");

        var labels = sorted.map(function (r) {
          if (!r.created_at) return "—";
          var d = new Date(r.created_at);
          return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        });
        var firstPassRates = sorted.map(function (r) {
          var m = r.metadata || {};
          return m.first_pass_qa_rate !== null && m.first_pass_qa_rate !== undefined ? Number(m.first_pass_qa_rate) * 100 : null;
        });
        var reworkRates = sorted.map(function (r) {
          var m = r.metadata || {};
          return m.rework_rate !== null && m.rework_rate !== undefined ? Number(m.rework_rate) : null;
        });

        var config = {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "First-Pass QA (%)",
                data: firstPassRates,
                borderColor: "#059669",
                backgroundColor: "rgba(5, 150, 105, 0.08)",
                fill: false,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: "#059669",
                yAxisID: "y",
              },
              {
                label: "Rework Rate",
                data: reworkRates,
                borderColor: "#d97706",
                backgroundColor: "rgba(217, 119, 6, 0.08)",
                fill: false,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: "#d97706",
                yAxisID: "y1",
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: "top", labels: { font: { family: "'DM Sans'" }, usePointStyle: true, pointStyle: "circle" } },
            },
            scales: {
              y: {
                type: "linear",
                position: "left",
                beginAtZero: true,
                max: 100,
                ticks: { callback: function (v) { return v + "%"; }, font: { family: "'DM Sans'" } },
                grid: { color: "rgba(0,0,0,0.04)" },
                title: { display: true, text: "First-Pass QA %", font: { family: "'DM Sans'", size: 11 } },
              },
              y1: {
                type: "linear",
                position: "right",
                beginAtZero: true,
                ticks: { font: { family: "'DM Sans'" } },
                grid: { drawOnChartArea: false },
                title: { display: true, text: "Rework Rate", font: { family: "'DM Sans'", size: 11 } },
              },
              x: {
                ticks: { font: { family: "'DM Sans'" } },
                grid: { display: false },
              }
            }
          }
        };

        if (qualityChart) {
          qualityChart.data = config.data;
          qualityChart.update();
        } else {
          qualityChart = new Chart(ctx, config);
        }
      }

      // -- Agent Fitness ------------------------------------------------------

      function renderAgents() {
        var grid = document.getElementById("agent-grid");
        if (agentData.length === 0) {
          grid.innerHTML = emptyCard("No agent data yet", "Agent fitness data appears after pipeline invocations.");
          return;
        }

        grid.innerHTML = agentData.map(function (agent) {
          var isEva = (agent.agent || "").toLowerCase() === "eva";
          var badgeHtml;
          if (isEva) {
            badgeHtml = '<span class="agent-badge" style="color:var(--text-light);background:transparent;border:none;font-weight:600;letter-spacing:0.08em;">ORCHESTRATOR</span>';
          } else {
            var badge = getAgentBadge(agent);
            badgeHtml = '<span class="agent-badge ' + badge.cls + '">' + escapeHtml(badge.label) + '</span>';
          }
          return '<div class="agent-card' + (isEva ? ' agent-card--orchestrator' : '') + '" data-agent="' + escapeHtml(agent.agent || "") + '">' +
            '<div class="agent-card-header">' +
              '<span class="agent-name">' + escapeHtml(agent.agent || "Unknown") + '</span>' +
              badgeHtml +
            '</div>' +
            '<div class="agent-stats">' +
              '<div><div class="agent-stat-label">Invocations</div><div class="agent-stat-value">' + (agent.invocations || 0) + '</div></div>' +
              '<div><div class="agent-stat-label">Avg Duration</div><div class="agent-stat-value">' + fmtDuration(agent.avg_duration_ms) + '</div></div>' +
              '<div><div class="agent-stat-label">Total Cost</div><div class="agent-stat-value">' + fmtCost(agent.total_cost) + '</div></div>' +
              '<div><div class="agent-stat-label">Avg Tokens</div><div class="agent-stat-value">' + fmt(agent.avg_input_tokens, 0) + ' / ' + fmt(agent.avg_output_tokens, 0) + '</div></div>' +
            '</div>' +
          '</div>';
        }).join("");

        // Attach click handlers (Eva's card is display-only -- no modal)
        var cards = grid.querySelectorAll(".agent-card[data-agent]");
        cards.forEach(function (card) {
          var agentName = card.getAttribute("data-agent");
          if (agentName && agentName.toLowerCase() !== "eva") {
            card.addEventListener("click", function () {
              openAgentModal(agentName);
            });
          }
        });
      }

      function getAgentBadge(agent) {
        // Badge is based on real quality telemetry only.
        // first_pass_qa and rework_rate come from pipeline telemetry capture (v3.8.0+).
        // Until that data exists, all agents show PROCESSING.
        var meta = agent.metadata || {};
        var firstPassQa = (meta.first_pass_qa_rate !== null && meta.first_pass_qa_rate !== undefined)
          ? Number(meta.first_pass_qa_rate) : null;
        var rework = (meta.rework_rate !== null && meta.rework_rate !== undefined)
          ? Number(meta.rework_rate) : null;

        var hasQualityData = firstPassQa !== null || rework !== null;

        if (!hasQualityData) {
          return { cls: "badge-processing", label: "Processing" };
        }

        // Quality data is present -- evaluate thresholds.
        var qa = firstPassQa !== null ? firstPassQa * 100 : null;   // convert 0-1 to percentage
        var rw = rework !== null ? rework : null;

        var isStruggling = (qa !== null && qa < 80 && qa >= 50) || (rw !== null && rw >= 1.0 && rw <= 2.0);
        var isThriving   = (qa !== null && qa >= 80) && (rw === null || rw <= 1.0);

        if (isThriving)   return { cls: "badge-thriving",   label: "Thriving" };
        if (isStruggling) return { cls: "badge-struggling", label: "Struggling" };
        return { cls: "badge-nominal", label: "Nominal" };
      }

      // -- Agent Detail Modal --------------------------------------------------

      function openAgentModal(agentName) {
        var overlay = document.getElementById("agent-modal-overlay");
        var nameEl = document.getElementById("modal-agent-name");
        var badgeEl = document.getElementById("modal-agent-badge");
        var bodyEl = document.getElementById("modal-body");

        nameEl.textContent = agentName.charAt(0).toUpperCase() + agentName.slice(1);

        // Eva always shows ORCHESTRATOR; all others use quality-based badge.
        var isEva = agentName.toLowerCase() === "eva";
        if (isEva) {
          badgeEl.className = "agent-badge";
          badgeEl.style.cssText = "color:var(--text-light);background:transparent;border:none;font-weight:600;letter-spacing:0.08em;";
          badgeEl.textContent = "ORCHESTRATOR";
        } else {
          var agentInfo = agentData.find(function (a) { return a.agent === agentName; });
          var badge = agentInfo ? getAgentBadge(agentInfo) : { cls: "badge-processing", label: "Processing" };
          badgeEl.className = "agent-badge " + badge.cls;
          badgeEl.style.cssText = "";
          badgeEl.textContent = badge.label;
        }
        bodyEl.innerHTML = '<div class="modal-loading">Loading agent detail...</div>';

        overlay.classList.add("visible");

        var url = "/api/telemetry/agent-detail?name=" + encodeURIComponent(agentName) + (selectedScope && selectedScope !== "all" ? "&scope=" + encodeURIComponent(selectedScope) : "");

        api(url).then(function (rows) {
          if (!rows || rows.length === 0) {
            bodyEl.innerHTML = '<div class="modal-loading">No invocation data found for this agent.</div>';
            return;
          }
          renderModalBody(bodyEl, rows);
        }).catch(function () {
          bodyEl.innerHTML = '<div class="modal-loading" style="color:var(--red)">Failed to load agent detail.</div>';
        });
      }

      function hasAgentQualityData(rows) {
        // Quality data means at least one invocation row carries rework or QA telemetry.
        // The agent-detail endpoint returns individual invocation rows; quality telemetry
        // is attached to pipeline summary rows, not per-invocation rows. Until a future
        // endpoint surfaces per-agent aggregated quality metrics, this returns false.
        return rows.some(function (r) {
          var m = r.metadata || {};
          return (m.rework_rate !== null && m.rework_rate !== undefined) ||
                 (m.first_pass_qa_rate !== null && m.first_pass_qa_rate !== undefined);
        });
      }

      function renderModalBody(container, rows) {
        if (hasAgentQualityData(rows)) {
          // -- Future path: quality data exists, show Struggles / Thrives judgment --
          renderModalBodyWithQuality(container, rows);
        } else {
          // -- Current path: no quality telemetry yet, show neutral activity log --
          renderModalBodyActivity(container, rows);
        }
      }

      function renderModalBodyActivity(container, rows) {
        // Sort by date descending (most recent first), take up to 10.
        var recent = rows.slice().sort(function (a, b) {
          return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        }).slice(0, 10);

        var html = '<div class="modal-section">';
        html += '<div class="modal-section-header"><span>Recent Activity</span></div>';
        html += '<table class="modal-table">';
        html += '<thead><tr><th>Description</th><th>Duration</th><th>Cost</th><th>Model</th><th>Date</th></tr></thead>';
        html += '<tbody>';
        recent.forEach(function (r) {
          var desc = r.description || "(no description)";
          html += '<tr>' +
            '<td class="desc" title="' + escapeHtml(desc) + '">' + escapeHtml(desc) + '</td>' +
            '<td class="num">' + fmtDuration(r.duration_ms) + '</td>' +
            '<td class="num">' + fmtCost(r.cost_usd) + '</td>' +
            '<td>' + escapeHtml(r.model || "--") + '</td>' +
            '<td class="num">' + fmtDate(r.created_at) + '</td>' +
          '</tr>';
        });
        html += '</tbody></table>';
        html += '</div>';

        container.innerHTML = html;
      }

      function renderModalBodyWithQuality(container, rows) {
        // This path activates only when rows contain rework_rate or first_pass_qa_rate.
        // Sort by rework count descending for Struggles, ascending for Thrives.
        var withRework = rows.map(function (r, i) {
          return { row: r, rework: Number((r.metadata || {}).rework_rate) || 0, index: i };
        });

        var struggles = withRework.slice().sort(function (a, b) { return b.rework - a.rework; }).slice(0, 5);
        var thrives   = withRework.slice().sort(function (a, b) { return a.rework - b.rework; }).slice(0, 5);

        var warnIcon  = '<svg class="modal-section-icon" viewBox="0 0 20 20" fill="var(--accent)" style="color:var(--accent)"><path d="M8.6 3.5L1.4 15.5c-.5.9.1 2 1.2 2h14.8c1.1 0 1.7-1.1 1.2-2L11.4 3.5c-.5-.9-2.3-.9-2.8 0zM10 8v3m0 3h.01"/></svg>';
        var checkIcon = '<svg class="modal-section-icon" viewBox="0 0 20 20" fill="#22c55e" style="color:#22c55e"><circle cx="10" cy="10" r="8"/><path d="M7 10l2 2 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        var html = '';
        html += '<div class="modal-section">';
        html += '<div class="modal-section-header">' + warnIcon + '<span>Struggles</span></div>';
        html += buildModalTable(struggles.map(function (x) { return x; }));
        html += '</div>';
        html += '<div class="modal-section">';
        html += '<div class="modal-section-header">' + checkIcon + '<span>Thrives</span></div>';
        html += buildModalTable(thrives.map(function (x) { return x; }));
        html += '</div>';

        container.innerHTML = html;
      }

      function buildModalTable(items) {
        var html = '<table class="modal-table">';
        html += '<thead><tr><th>Description</th><th>Duration</th><th>Cost</th><th>Model</th></tr></thead>';
        html += '<tbody>';
        items.forEach(function (item) {
          var r = item.row;
          var desc = r.description || "(no description)";
          html += '<tr>' +
            '<td class="desc" title="' + escapeHtml(desc) + '">' + escapeHtml(desc) + '</td>' +
            '<td class="num">' + fmtDuration(r.duration_ms) + '</td>' +
            '<td class="num">' + fmtCost(r.cost_usd) + '</td>' +
            '<td>' + escapeHtml(r.model || "--") + '</td>' +
          '</tr>';
        });
        html += '</tbody></table>';
        return html;
      }

      function closeAgentModal() {
        var overlay = document.getElementById("agent-modal-overlay");
        overlay.classList.remove("visible");
      }

      // -- Degradation Alerts -------------------------------------------------

      function renderAlerts() {
        var list = document.getElementById("alert-list");

        if (summaryData.length < 3) {
          list.innerHTML = '<div class="card"><div class="empty-state" style="padding:24px">' +
            '<p>Alerts require at least 3 pipeline runs to detect trends.</p></div></div>';
          return;
        }

        var alerts = [];
        var recent3 = summaryData.slice(0, 3);

        // Cost spike: >25% above average for 3 consecutive
        var allCosts = summaryData.map(function (r) { return Number((r.metadata || {}).total_cost_usd) || 0; });
        var avgCost = allCosts.reduce(function (a, b) { return a + b; }, 0) / allCosts.length;
        var costThreshold = avgCost * 1.25;
        var costBreaches = recent3.filter(function (r) {
          return (Number((r.metadata || {}).total_cost_usd) || 0) > costThreshold;
        });
        if (costBreaches.length === 3 && avgCost > 0) {
          alerts.push({
            critical: true,
            text: "Cost spike: last 3 pipelines exceed 25% above average ($" + fmt(avgCost) + "). Recent: " +
              recent3.map(function (r) { return fmtCost((r.metadata || {}).total_cost_usd); }).join(", ") + "."
          });
        }

        // Rework rate: >2.0 for 3 consecutive
        var reworkBreaches = recent3.filter(function (r) {
          return (Number((r.metadata || {}).rework_rate) || 0) > 2.0;
        });
        if (reworkBreaches.length === 3) {
          alerts.push({
            critical: true,
            text: "Rework accumulation: rework rate above 2.0 for 3 consecutive pipelines. Values: " +
              recent3.map(function (r) { return fmt((r.metadata || {}).rework_rate, 1); }).join(", ") + "."
          });
        }

        // First-pass QA: <60% for 3 consecutive
        var qaBreaches = recent3.filter(function (r) {
          var rate = (r.metadata || {}).first_pass_qa_rate;
          return rate !== null && rate !== undefined && Number(rate) < 0.6;
        });
        if (qaBreaches.length === 3) {
          alerts.push({
            critical: false,
            text: "First-pass QA degradation: below 60% for 3 consecutive pipelines. Values: " +
              recent3.map(function (r) { return fmtPercent((r.metadata || {}).first_pass_qa_rate); }).join(", ") + "."
          });
        }

        // EvoScore: <0.9 for 3 consecutive
        var evoBreaches = recent3.filter(function (r) {
          var evo = (r.metadata || {}).evoscore;
          return evo !== null && evo !== undefined && Number(evo) < 0.9;
        });
        if (evoBreaches.length === 3) {
          alerts.push({
            critical: true,
            text: "EvoScore degradation: below 0.9 for 3 consecutive pipelines. Values: " +
              recent3.map(function (r) { return fmt((r.metadata || {}).evoscore, 2); }).join(", ") + "."
          });
        }

        if (alerts.length === 0) {
          list.innerHTML = '<div class="card"><div class="empty-state" style="padding:24px">' +
            '<svg class="empty-state-icon" viewBox="0 0 48 48" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;margin-bottom:8px">' +
            '<circle cx="24" cy="24" r="20"/><path d="M16 24l5 5 11-11"/></svg>' +
            '<p style="color:#059669;font-weight:500">All clear. No degradation thresholds breached.</p></div></div>';
          return;
        }

        var warnSvg = '<svg class="alert-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M8.6 3.5L1.4 15.5c-.5.9.1 2 1.2 2h14.8c1.1 0 1.7-1.1 1.2-2L11.4 3.5c-.5-.9-2.3-.9-2.8 0zM10 8v3m0 3h.01"/></svg>';

        list.innerHTML = alerts.map(function (a) {
          return '<div class="alert-card' + (a.critical ? ' alert-critical' : '') + '">' +
            warnSvg +
            '<div class="alert-text">' + escapeHtml(a.text) + '</div>' +
          '</div>';
        }).join("");
      }

      // -- Recent Pipelines Table ---------------------------------------------

      function renderPipelinesTable() {
        var wrap = document.getElementById("pipelines-table-wrap");

        if (summaryData.length === 0) {
          wrap.innerHTML = emptyCard("No pipelines recorded", "Pipeline history will appear here after your first completed pipeline.");
          return;
        }

        var rows = summaryData.map(function (r) {
          var meta = r.metadata || {};
          var sizing = meta.sizing || "unknown";
          var sizingCls = "sizing-" + sizing;
          return '<tr>' +
            '<td>' + fmtDate(r.created_at) + '</td>' +
            '<td><span class="sizing-badge ' + sizingCls + '">' + escapeHtml(sizing) + '</span></td>' +
            '<td class="num">' + fmtCost(meta.total_cost_usd) + '</td>' +
            '<td class="num">' + fmtDuration(meta.total_duration_ms) + '</td>' +
            '<td class="num">' + fmt(meta.rework_rate, 1) + '</td>' +
            '<td class="num">' + fmtPercent(meta.first_pass_qa_rate) + '</td>' +
            '<td class="num">' + fmt(meta.evoscore, 2) + '</td>' +
          '</tr>';
        });

        wrap.innerHTML = '<table class="pipeline-table">' +
          '<thead><tr>' +
            '<th>Date</th><th>Size</th><th>Cost</th><th>Duration</th><th>Rework</th><th>QA Rate</th><th>EvoScore</th>' +
          '</tr></thead>' +
          '<tbody>' + rows.join("") + '</tbody>' +
        '</table>';
      }

      // -- Empty State Helper -------------------------------------------------

      function emptyCard(title, desc) {
        return '<div class="card"><div class="empty-state">' +
          '<svg class="empty-state-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="6" y="6" width="36" height="36" rx="6"/>' +
          '<path d="M18 20h12M18 28h8"/>' +
          '</svg>' +
          '<h3>' + escapeHtml(title) + '</h3>' +
          '<p>' + escapeHtml(desc) + '</p>' +
        '</div></div>';
      }

      // =======================================================================
      // Init
      // =======================================================================

      document.getElementById("scope-select").addEventListener("change", onScopeChange);

      // Modal event listeners
      document.getElementById("modal-close").addEventListener("click", closeAgentModal);
      document.getElementById("agent-modal-overlay").addEventListener("click", function (e) {
        if (e.target === this) closeAgentModal();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeAgentModal();
      });

      loadAll();
      refreshTimer = setInterval(loadAll, REFRESH_INTERVAL);
    })();
  </script>
</body>
</html>
