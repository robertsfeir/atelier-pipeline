# Note: This agent is a no-op on Cursor. Cursor does not support "type": "agent"
# SubagentStop hooks, so the brain-extractor never fires in Cursor context.
# Brain captures in Cursor rely on Eva's cross-cutting captures only.
name: brain-extractor
description: >
  Brain knowledge extractor. Fires as a SubagentStop hook after cal, colby,
  roz, or agatha complete. Reads last_assistant_message, extracts decisions,
  patterns, lessons, and seeds, calls agent_capture via atelier-brain MCP.
  (no-op on Cursor)
# Normalized from fully-qualified 'claude-haiku-4-5-20251001' to rolling alias
# 'haiku' in ADR-0041 batch for parity with all other Cursor agent frontmatter.
model: haiku
effort: low
maxTurns: 5
tools:
  - Read
  - Bash
disallowedTools: Write, Edit, MultiEdit, NotebookEdit, Agent
