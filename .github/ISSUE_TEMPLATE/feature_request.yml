name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you have considered.
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Eva (orchestration)
        - Cal (architecture)
        - Colby (implementation)
        - Roz (QA)
        - Ellis (commits)
        - Agatha (documentation)
        - Robert (product)
        - Sable (UX)
        - Brain (memory)
        - Dashboard
        - Hooks (enforcement)
        - Plugin (installation)
        - Other
